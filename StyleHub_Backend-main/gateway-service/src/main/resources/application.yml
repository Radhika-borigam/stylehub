server:
  port: 8081

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path= /auth/**, /api/admin/users/**, /api/users/**, /users/**

        - id: salon-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path= /salons/**, /api/salons/**, /api/admin/salons/**

        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/categories/**

        - id: service-offering
          uri: lb://SERVICE-OFFERING
          predicates:
            - Path= /api/service-offering/**

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/bookings/**

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**
        - id: notification-service
          uri:
            "lb://NOTIFICATION-SERVICE"
          predicates:
            - Path= /api/notifications/**

        - id: review-service
          uri:
            "lb://REVIEW-SERVICE"
          predicates:
            - Path= /api/reviews/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - UserContext
      global-cors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
  security:
    oauth2:
      resource server:
        jwt:
          jwk-set-uri: "http://stylehub-keycloak:8080/realms/master/protocol/openid-connect/certs"

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
